name: "PR Subtree Push"

permissions:
  contents: write

concurrency:
  group: subtree-push-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

on:
  pull_request_target:
    branches:
        - main
        - v1
    types: [closed]

jobs:
  split-subtrees:
    if: ${{ github.event.pull_request.merged }}
    runs-on: macos-latest
    name: Split and Push Subtrees
    outputs:
      releaseVersion: ${{ steps.getVersion.outputs.RELEASE_VERSION }}
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.ref }}
        fetch-depth: 0
    - name: Generate GitHub App Token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.APOLLO_IOS_SUBTREE_APP_ID }}
        private-key: ${{ secrets.APOLLO_IOS_SUBTREE_APP_PRIVATE_KEY }}
        owner: apollographql
        repositories: |
          apollo-ios
          apollo-ios-codegen
          apollo-ios-pagination
    - name: Configure Git
      uses: ./.github/actions/configure-git
    - name: Subtree - Apollo iOS
      id: split-ios
      uses: ./.github/actions/subtree-split-push
      with:
        subtree: apollo-ios
        remote: https://github.com/apollographql/apollo-ios.git
        target-branch: ${{ github.event.pull_request.base.ref }}
        pr-number: ${{ github.event.pull_request.number }}
        pr-title: ${{ github.event.pull_request.title }}
    - name: Subtree - Apollo iOS Codegen
      id: split-codegen
      if: always()
      uses: ./.github/actions/subtree-split-push
      with:
        subtree: apollo-ios-codegen
        remote: https://github.com/apollographql/apollo-ios-codegen.git
        target-branch: ${{ github.event.pull_request.base.ref }}
        pr-number: ${{ github.event.pull_request.number }}
        pr-title: ${{ github.event.pull_request.title }}
    - name: Subtree - Apollo iOS Pagination
      id: split-pagination
      if: always()
      uses: ./.github/actions/subtree-split-push
      with:
        subtree: apollo-ios-pagination
        remote: https://github.com/apollographql/apollo-ios-pagination.git
        target-branch: ${{ github.event.pull_request.base.ref }}
        pr-number: ${{ github.event.pull_request.number }}
        pr-title: ${{ github.event.pull_request.title }}
    - name: Push Subtrees
      if: success()
      shell: bash
      env:
        GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        # Push each split SHA to its upstream main. Uses an HTTPS URL with
        # the GitHub App installation token in the Authorization header,
        # so branch protection rules that restrict pushes to the app's
        # identity will accept these pushes (and reject any others).
        push_subtree() {
          local repo="$1"
          local sha="$2"
          if [ -z "$sha" ]; then return; fi
          git -c "http.https://github.com/.extraheader=Authorization: Bearer ${GH_APP_TOKEN}" \
              push "https://github.com/apollographql/${repo}.git" \
              "${sha}:refs/heads/${{ github.event.pull_request.base.ref }}"
        }
        push_subtree apollo-ios            "${{ steps.split-ios.outputs.split-sha }}"
        push_subtree apollo-ios-codegen    "${{ steps.split-codegen.outputs.split-sha }}"
        push_subtree apollo-ios-pagination "${{ steps.split-pagination.outputs.split-sha }}"
    - name: Push Updated History
      if: success()
      shell: bash
      run: |
        git fetch
        if [ "$(git rev-list origin/${{ github.event.pull_request.base.ref }}..HEAD --count)" -eq 0 ]; then
          echo "No local commits to push, skipping."
          exit 0
        fi
        git push || echo "::warning::Failed to push updated history. This is non-fatal — the next successful run will re-sync subtree metadata."

  publish-release:
    if: success('split-subtrees') && startsWith(github.ref, 'refs/heads/release/')
    needs: split-subtrees
    runs-on: macos-latest
    name: Publish Release
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Configure Git
        uses: ./.github/actions/configure-git
      - name: Trigger publish-release workflow
        shell: bash
        run: |
          gh workflow run publish-release.yml
        env:
          GH_TOKEN: ${{ secrets.APOLLO_IOS_PAT }}